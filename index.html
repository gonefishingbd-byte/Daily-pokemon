<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate PokéDaily</title>
    <style>
        :root { --pk-red: #ff1c1c; --pk-blue: #3b4cca; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 25px; padding: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; position: relative; }
        
        /* Guessing Mode Filter */
        #pokemon-img { width: 220px; transition: filter 0.3s; cursor: pointer; }
        .silhouette { filter: brightness(0) !important; }
        
        .shiny-sparkle { color: #f1c40f; font-weight: bold; display: none; margin-bottom: 5px; }
        .type-pill { display: inline-block; padding: 5px 12px; border-radius: 15px; margin: 3px; color: white; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .weakness-box { margin-top: 15px; font-size: 0.75rem; color: #666; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-audio { background: #555; color: white; margin: 5px; }
        .btn-reveal { background: var(--pk-blue); color: white; margin-top: 10px; width: 100%; }
        
        /* Type Colors Map */
        .fire { background: #ff9d54; } .water { background: #4a90da; } .grass { background: #5fbd58; }
        .electric { background: #f2d144; } .psychic { background: #f97176; } .ice { background: #74cec0; }
        .dragon { background: #0773c7; } .dark { background: #5a5366; } .fairy { background: #ec8fe6; }
        .normal { background: #a4acaf; } .fighting { background: #d56723; } .flying { background: #3dc7ef; }
        .poison { background: #b97fc9; } .ground { background: #f7de3f; color: #333 !important; } .rock { background: #a38c21; }
        .bug { background: #729f3f; } .ghost { background: #7b62a3; } .steel { background: #9eb7b8; }
    </style>
</head>
<body>

    <div class="container">
        <div id="shiny-tag" class="shiny-sparkle">✨ SHINY FOUND! ✨</div>
        <img id="pokemon-img" class="silhouette" src="" alt="Who's that Pokémon?">
        
        <div id="info-screen" style="visibility: hidden;">
            <h1 id="pokemon-name" style="text-transform: capitalize;">Name</h1>
            <div id="types"></div>
            <button class="btn-audio" onclick="playCry()">🔊 Play Cry</button>
            <div class="weakness-box">
                <strong>Weaknesses:</strong><br>
                <div id="weaknesses" style="margin-top:5px"></div>
            </div>
        </div>
        
        <button id="reveal-btn" class="btn-reveal" onclick="reveal()">WHO'S THAT POKÉMON?</button>
    </div>

<script>
    const START_DATE = new Date("2024-01-01").setHours(0,0,0,0);
    const SEED = 8888;
    let currentCry = "";

    function getSeededSequence(seed) {
        let ids = Array.from({length: 1025}, (_, i) => i + 1);
        for (let i = ids.length - 1; i > 0; i--) {
            seed = (seed * 9301 + 49297) % 233280;
            let j = Math.floor((seed / 233280) * (i + 1));
            [ids[i], ids[j]] = [ids[j], ids[i]];
        }
        return ids;
    }

    async function init() {
        const sequence = getSeededSequence(SEED);
        const today = new Date().setHours(0,0,0,0);
        const daysPassed = Math.floor((today - START_DATE) / (1000 * 60 * 60 * 24));
        const dailyID = sequence[daysPassed % 1025];

        // 1. Shiny Logic (Seed + Date ensures same shiny for everyone today)
        const shinyChance = (SEED + daysPassed) % 4096 === 0; // Standard Game Odds

        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${dailyID}`);
        const data = await res.json();
        
        // Load Data
        document.getElementById('pokemon-name').innerText = data.name;
        document.getElementById('pokemon-img').src = shinyChance ? 
            data.sprites.other['official-artwork'].front_shiny : 
            data.sprites.other['official-artwork'].front_default;
        
        if(shinyChance) document.getElementById('shiny-tag').style.display = 'block';
        
        currentCry = data.cries.latest;
        
        // Load Types
        document.getElementById('types').innerHTML = data.types.map(t => 
            `<span class="type-pill ${t.type.name}">${t.type.name}</span>`
        ).join('');

        // Load Weaknesses
        fetchWeaknesses(data.types);
    }

    async function fetchWeaknesses(types) {
        let weaknesses = new Set();
        for(let t of types) {
            const res = await fetch(t.type.url);
            const typeData = await res.json();
            typeData.damage_relations.double_damage_from.forEach(w => weaknesses.add(w.name));
        }
        document.getElementById('weaknesses').innerHTML = Array.from(weaknesses).map(w => 
            `<span class="type-pill ${w}" style="font-size:0.6rem; padding:2px 8px">${w}</span>`
        ).join('');
    }

    function reveal() {
        document.getElementById('pokemon-img').classList.remove('silhouette');
        document.getElementById('info-screen').style.visibility = 'visible';
        document.getElementById('reveal-btn').style.display = 'none';
        playCry();
    }

    function playCry() {
        if(currentCry) new Audio(currentCry).play();
    }

    init();
</script>
</body>
</html>
